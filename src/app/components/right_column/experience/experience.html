<section class="exp-section">
  <div class="section-header">
    <h2>ДОСВІД</h2>
    <i class="fa-solid fa-chevron-down"></i>
  </div>
  <div class="content">
    @for (job of jobs; track job.position) {
      <div class="job-item">
        <h3>{{ job.position }}</h3>
        <div class="meta">
          <span class="tag">{{ job.tag }}</span>
          <span class="company">{{ job.company }}</span>
        </div>
        <p>{{ job.description }}</p>
      </div>
    }
  </div>
</section>
